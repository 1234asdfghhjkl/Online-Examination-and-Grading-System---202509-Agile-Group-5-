<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Exam</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Edit Exam</h3>
        <a href="/exams" class="btn btn-outline-secondary btn-sm">
            ← Back to exam list
        </a>
    </div>

    {{errors_html}}
    {{success_html}}

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form action="/exam-edit?exam_id={{exam_id}}" method="POST">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label fw-semibold">Exam Title</label>
                        <input type="text" name="title" class="form-control"
                               value="{{title}}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Exam Date</label>
                        <input type="date" name="exam_date" class="form-control"
                               value="{{exam_date}}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Duration (minutes)</label>
                        <input type="number" name="duration" min="1" class="form-control"
                               value="{{duration}}" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" rows="2" class="form-control">{{description}}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Instructions for Students</label>
                        <textarea name="instructions" rows="3" class="form-control">{{instructions}}</textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-3">
                    <button type="submit" class="btn btn-primary btn-rounded">
                        Save changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
